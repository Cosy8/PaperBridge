x-common-env: &common-env
  env_file: .env
  networks:
    - paperbridge

services:
  # ─── Infrastructure ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: *common-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: *common-env
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    <<: *common-env
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    <<: *common-env
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data

  elasticsearch:
    image: elasticsearch:8.13.0
    <<: *common-env
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 20s
      retries: 5

  minio:
    image: minio/minio:latest
    <<: *common-env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}

  # ─── Application Services ──────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    <<: *common-env
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
    volumes:
      - faiss_data:/data/faiss
      - model_cache:/root/.cache/huggingface
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    <<: *common-env
    depends_on:
      - redis
      - kafka
      - postgres
    volumes:
      - faiss_data:/data/faiss
      - model_cache:/root/.cache/huggingface
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4

  scraper:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    <<: *common-env
    depends_on:
      - kafka
    volumes:
      - ./services/scraper:/app

  processor:
    build:
      context: ./services/processor
      dockerfile: Dockerfile
    <<: *common-env
    depends_on:
      - kafka
      - elasticsearch
      - postgres
    volumes:
      - faiss_data:/data/faiss
      - model_cache:/root/.cache/huggingface

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - paperbridge
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

  # ─── MLflow ───────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    <<: *common-env
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --backend-store-uri /mlflow --default-artifact-root /mlflow/artifacts
    profiles: ["mlflow"]

  # ─── Airflow ──────────────────────────────────────────────────
  airflow:
    image: apache/airflow:2.9.1
    <<: *common-env
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    command: standalone
    depends_on:
      postgres: { condition: service_healthy }
    profiles: ["airflow"]

  # ─── Observability ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    <<: *common-env
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:10.4.0
    <<: *common-env
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infrastructure/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    depends_on: [prometheus]
    profiles: ["monitoring"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    <<: *common-env
    volumes:
      - ./infrastructure/monitoring/otel-collector.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    profiles: ["monitoring"]

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  es_data:
  minio_data:
  faiss_data:
  model_cache:
  mlflow_data:
  airflow_logs:
  prometheus_data:
  grafana_data:

networks:
  paperbridge:
    driver: bridge
