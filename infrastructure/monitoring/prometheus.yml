global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "paperbridge-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "celery-worker"
    static_configs:
      - targets: ["worker:9090"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9101"]

  - job_name: "elasticsearch"
    static_configs:
      - targets: ["elasticsearch:9200"]
    metrics_path: /_prometheus/metrics

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
