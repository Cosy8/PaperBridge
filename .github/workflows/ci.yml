name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [scraper, processor, api, worker]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install ruff mypy pytest pytest-cov pytest-asyncio
          # Install CPU-only torch first for services that pull it transitively
          # (sentence-transformers). Otherwise pip fetches the default CUDA build
          # (~5GB of nvidia-* wheels), which is slow and can exhaust runner disk,
          # leaving a partial install (e.g. a missing transitive dep). Mirrors the
          # service Dockerfiles. See CLAUDE.md "Docker Image Optimization".
          if grep -q "sentence-transformers" services/${{ matrix.service }}/requirements.txt; then
            pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu
          fi
          pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Ruff lint
        run: ruff check services/${{ matrix.service }}/

      - name: Mypy type check
        run: mypy services/${{ matrix.service }}/app/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        env:
          # Dummy values so each service's module-level `Settings()` constructs
          # at import time. Tests mock all external clients; nothing connects.
          POSTGRES_URL: postgresql://test:test@localhost:5432/test
          API_SECRET_KEY: test-secret-key
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: test
        run: |
          pytest services/${{ matrix.service }}/tests/ \
            --cov=services/${{ matrix.service }}/app \
            --cov-report=xml \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: ${{ matrix.service }}
